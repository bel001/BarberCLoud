name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    name: Calidad y cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias backend
        run: npm -C backend ci

      - name: Ejecutar pruebas con cobertura
        run: npm -C backend run test:coverage

      - name: Ejecutar analisis SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  iac:
    name: Terraform y Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.7

      - name: Terraform fmt
        run: terraform -chdir=iac fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=iac init -backend=false

      - name: Terraform validate
        run: terraform -chdir=iac validate

      - name: Checkov IaC
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: iac
          quiet: true
          framework: terraform
