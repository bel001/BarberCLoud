services:
  dynamodb:
    image: amazon/dynamodb-local
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      TABLE_NAME: barbercloud-local
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      CORS_ORIGIN: http://localhost:8080,http://127.0.0.1:8080
      SEED_DEMO: "true"
    depends_on:
      - dynamodb

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
