<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear cuenta | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">BC</span><span>BarberCloud</span></div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="login.html">Ingresar</a>
    </nav>
  </header>

  <main class="form-card">
    <p class="eyebrow">Cuenta cliente</p>
    <h2>Crea tu cuenta para reservar</h2>
    <p class="card-text">Puedes navegar sin cuenta, pero para confirmar una cita necesitas registrarte.</p>

    <form>
      <label for="nombreCliente">Nombre completo</label>
      <input id="nombreCliente" type="text" placeholder="Tu nombre">

      <label for="emailCliente">Correo electrónico</label>
      <input id="emailCliente" type="email" placeholder="correo@email.com">

      <label for="passwordCliente">Contraseña</label>
      <input id="passwordCliente" type="password" placeholder="********">

      <button class="btn-primary" type="button" onclick="registrarCliente()">Crear cuenta</button>
    </form>

    <div class="notice" id="resultado">En AWS este registro se conecta con Amazon Cognito.</div>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    function registrarCliente() {
      if (BARBERCLOUD_CONFIG.AUTH_MODE === "cognito") {
        AUTH.registerWithCognito();
        return;
      }

      document.getElementById("resultado").innerText = "En modo local usa las cuentas demo del README.";
    }
  </script>
</body>
</html>
