<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretaria | Agenda Global</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="assets/css/barbero-panel.css">

<script src="assets/js/theme-init.js"></script>
</head>
<body>
  <div class="barber-shell">
    <aside class="barber-sidebar">
      <div class="barber-sidebar-brand">
        <span class="material-symbols-outlined">content_cut</span>
        <span>BarberCloud</span>
      </div>

      <div class="barber-identity">
        <div class="barber-identity-avatar" id="secretariaAvatar">S</div>
        <div>
          <p class="barber-identity-name" id="secretariaNombre">Secretaria</p>
          <p class="barber-identity-role">Secretaria</p>
        </div>
      </div>

      <nav class="barber-nav">
        <a href="secretaria.html" class="barber-nav-link">
          <span class="material-symbols-outlined">dashboard</span>
          <span>Dashboard</span>
        </a>
        <a href="secretaria-agenda.html" class="barber-nav-link active">
          <span class="material-symbols-outlined">calendar_month</span>
          <span>Agenda Global</span>
        </a>
        <a href="secretaria-clientes.html" class="barber-nav-link">
          <span class="material-symbols-outlined">group</span>
          <span>Clientes</span>
        </a>
        <a href="secretaria-pos.html" class="barber-nav-link">
          <span class="material-symbols-outlined">point_of_sale</span>
          <span>POS</span>
        </a>
        <a href="secretaria-inventario.html" class="barber-nav-link">
          <span class="material-symbols-outlined">inventory_2</span>
          <span>Inventario</span>
        </a>
      </nav>

      <div class="barber-sidebar-footer">
        <button class="theme-toggle" title="Cambiar tema">
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button type="button" class="nav-link nav-button" data-logout>
          <span class="material-symbols-outlined">logout</span>
          Salir
        </button>
      </div>
    </aside>

    <main class="barber-main max-w-full">
      <div class="barber-topbar">
        <h2>Agenda Global</h2>
        <p>Vista cronograma de todos los barberos, agrupada por columnas.</p>
      </div>

      <div class="form-group max-w-220">
        <label class="form-label" for="filtroFecha">Fecha</label>
        <input type="date" id="filtroFecha" class="form-input">
      </div>

      <div id="agendaGlobalGrid" class="option-grid grid-auto-280 items-start"></div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/secretaria-agenda.js"></script>
</body>
</html>
