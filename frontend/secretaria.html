<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretaria | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">

<script>
  (function(){var t=localStorage.getItem("barbercloud_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();
</script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">BC</span>
        <span>BarberCloud</span>
      </a>
      <nav class="header-nav">
        <button class="theme-toggle" title="Cambiar tema">
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button type="button" class="nav-link nav-button" data-logout>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </nav>
    </div>
  </header>

  <main class="dashboard">
    <div class="container">
      <p class="eyebrow">Operación interna</p>
      <h1 style="margin-bottom: 32px;">Panel de Secretaria</h1>

      <div class="dashboard-grid">
        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Registrar cita presencial
            </h3>
          </div>
          <p class="text-muted mb-4">Solo se permite agendar a clientes que ya tienen cuenta.</p>
          <form id="formPresencial" class="flex flex-col gap-4">
            <div class="form-group">
              <label class="form-label" for="clienteCorreo">Correo del cliente</label>
              <input type="email" id="clienteCorreo" class="form-input" placeholder="cliente@barbercloud.com" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="servicioId">Servicio</label>
              <input type="text" id="servicioId" class="form-input" placeholder="corte-clasico" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="barberoId">Barbero</label>
              <input type="text" id="barberoId" class="form-input" placeholder="barbero_carlos" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="fecha">Fecha</label>
                <input type="date" id="fecha" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="hora">Hora</label>
                <input type="text" id="hora" class="form-input" placeholder="10:00" required>
              </div>
            </div>
            <button class="btn btn-primary" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Registrar cita
            </button>
          </form>
          <div id="resultado" class="mt-4"></div>
        </div>

        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              POS y caja
            </h3>
          </div>
          <form id="formVenta" class="flex flex-col gap-4">
            <div class="form-group">
              <label class="form-label" for="conceptoVenta">Concepto</label>
              <input type="text" id="conceptoVenta" class="form-input" placeholder="Venta mostrador" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="totalVenta">Total (S/)</label>
              <input type="number" id="totalVenta" class="form-input" min="1" placeholder="25" required>
            </div>
            <button class="btn btn-primary" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Registrar venta
            </button>
          </form>
          <div id="pos" class="mt-4">
            <div class="stat-card">
              <span class="stat-label">Total en caja</span>
              <span class="stat-value">S/ <span id="caja-total">0</span></span>
            </div>
          </div>
        </div>

        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              </svg>
              Inventario
            </h3>
          </div>
          <form id="formInventario" class="flex flex-col gap-4">
            <div class="form-group">
              <label class="form-label" for="nombreProducto">Producto</label>
              <input type="text" id="nombreProducto" class="form-input" placeholder="Cera moldeadora" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="stockProducto">Stock</label>
                <input type="number" id="stockProducto" class="form-input" min="0" placeholder="20" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="precioProducto">Precio (S/)</label>
                <input type="number" id="precioProducto" class="form-input" min="0" placeholder="25" required>
              </div>
            </div>
            <button class="btn btn-primary" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Actualizar inventario
            </button>
          </form>
          <div id="inventario" class="flex flex-col gap-2 mt-4"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/secretaria.js"></script>
</body>
</html>
