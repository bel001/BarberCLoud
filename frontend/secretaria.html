<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Secretaria | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">BC</span><span>BarberCloud</span></div>
    <nav><a href="#" onclick="AUTH.logout()">Salir</a></nav>
  </header>

  <main class="dashboard">
    <section class="dashboard-card">
      <p class="eyebrow">Operación interna</p>
      <h2>Registrar cita presencial</h2>
      <p>Solo se permite agendar a clientes que ya tienen cuenta.</p>

      <form id="formPresencial">
        <label>Correo del cliente registrado</label>
        <input id="clienteCorreo" type="email" required placeholder="cliente@barbercloud.com">

        <label>Servicio</label>
        <input id="servicioId" required value="corte-clasico">

        <label>Barbero</label>
        <input id="barberoId" required value="barbero_carlos">

        <label>Fecha</label>
        <input id="fecha" type="date" required>

        <label>Hora</label>
        <input id="hora" required value="10:00">

        <button class="btn-primary" type="submit">Registrar cita</button>
      </form>

      <div id="resultado" class="notice"></div>
    </section>

    <section class="dashboard-card">
      <h2>POS y caja</h2>
      <form id="formVenta">
        <label>Concepto</label>
        <input id="conceptoVenta" required value="Venta mostrador">
        <label>Total</label>
        <input id="totalVenta" type="number" min="1" required value="25">
        <button class="btn-primary" type="submit">Registrar venta</button>
      </form>
      <div id="pos" class="table-list"></div>
    </section>

    <section class="dashboard-card">
      <h2>Inventario</h2>
      <form id="formInventario">
        <label>Producto</label>
        <input id="nombreProducto" required value="Cera moldeadora">
        <label>Stock</label>
        <input id="stockProducto" type="number" min="0" required value="20">
        <label>Precio</label>
        <input id="precioProducto" type="number" min="0" required value="25">
        <button class="btn-primary" type="submit">Actualizar inventario</button>
      </form>
      <div id="inventario" class="table-list"></div>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/secretaria.js"></script>
</body>
</html>
