<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Cliente | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">BC</span><span>BarberCloud</span></div>
    <nav>
      <a href="reservar.html">Nueva reserva</a>
      <button type="button" class="nav-button" onclick="AUTH.logout()">Salir</button>
    </nav>
  </header>

  <main class="dashboard">
    <section class="dashboard-card">
      <p class="eyebrow">Cliente</p>
      <h2>Mis reservas</h2>
      <div id="reservas" class="table-list"></div>
    </section>

    <section class="dashboard-card">
      <h3>Reserva pendiente</h3>
      <p>Si venías desde la página pública, confirma aquí tu selección.</p>
      <button class="btn-primary" onclick="confirmarPendiente()">Confirmar pendiente</button>
      <div id="resultado" class="notice"></div>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/cliente.js"></script>
</body>
</html>
