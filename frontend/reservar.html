<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservar | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">

<script>
  (function(){var t=localStorage.getItem("barbercloud_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();
</script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">BC</span>
        <span>BarberCloud</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="login.html" class="nav-link nav-cta">Ingresar</a>
        <button class="theme-toggle" title="Cambiar tema">
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main class="dashboard">
    <div class="container" style="max-width: 600px;">
      <p class="eyebrow">Reserva online</p>
      <h1 style="margin-bottom: 32px;">Elige tu horario</h1>

      <div class="dashboard-card" style="margin-bottom: 24px;">
        <p class="text-muted mb-4">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;vertical-align:middle;margin-right:8px;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          Puedes revisar la disponibilidad sin cuenta. Para confirmar la cita deberás iniciar sesión.
        </p>

        <form id="formReservaPublica" class="flex flex-col gap-4">
          <div class="form-group">
            <label class="form-label" for="servicioId">Servicio</label>
            <select id="servicioId" class="form-input"></select>
          </div>

          <div class="form-group">
            <label class="form-label" for="barberoId">Barbero</label>
            <select id="barberoId" class="form-input"></select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="fecha">Fecha</label>
              <input type="date" id="fecha" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="hora">Hora</label>
              <select id="hora" class="form-input"></select>
            </div>
          </div>

          <button class="btn btn-primary btn-lg" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Confirmar reserva
          </button>
        </form>

        <div id="resultado" class="mt-4"></div>
      </div>

      <div class="card" style="text-align:center;padding:24px;">
        <p class="text-muted">¿Ya tienes cuenta?</p>
        <a class="btn btn-secondary" href="login.html">Iniciar sesión</a>
      </div>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/reservar-publico.js"></script>
</body>
</html>
