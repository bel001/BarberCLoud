<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbero | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">

<script>
  (function(){var t=localStorage.getItem("barbercloud_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();
</script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">BC</span>
        <span>BarberCloud</span>
      </a>
      <nav class="header-nav">
        <button class="theme-toggle" title="Cambiar tema">
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button type="button" class="nav-link nav-button" data-logout>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </nav>
    </div>
  </header>

  <main class="dashboard">
    <div class="container">
      <p class="eyebrow">Panel del Barbero</p>
      <h1 style="margin-bottom: 32px;">Agenda del día</h1>

      <div class="dashboard-grid">
        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Mis citas
            </h3>
          </div>
          <div id="agenda" class="flex flex-col gap-3"></div>
        </div>

        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="1" x2="12" y2="23"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
              Insumos de estación
            </h3>
          </div>
          <form id="formInsumo" class="flex flex-col gap-4">
            <div class="form-group">
              <label class="form-label" for="insumoId">ID Insumo</label>
              <input type="text" id="insumoId" class="form-input" placeholder="gel" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="nombreInsumo">Nombre</label>
              <input type="text" id="nombreInsumo" class="form-input" placeholder="Gel fijador" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="cantidadInsumo">Cantidad</label>
              <input type="number" id="cantidadInsumo" class="form-input" min="1" placeholder="1" required>
            </div>
            <button class="btn btn-primary" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Registrar consumo
            </button>
          </form>
          <div id="insumos" class="flex flex-col gap-2 mt-4"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/barbero.js"></script>
</body>
</html>
