<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbero | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">
  <link rel="stylesheet" href="assets/css/barbero-panel.css">

<script src="assets/js/theme-init.js"></script>
</head>
<body>
  <div class="barber-shell">
    <aside class="barber-sidebar">
      <div class="barber-sidebar-brand">
        <span class="material-symbols-outlined">content_cut</span>
        <span>BarberCloud</span>
      </div>

      <div class="barber-identity">
        <div class="barber-identity-avatar" id="barberoAvatar">B</div>
        <div>
          <p class="barber-identity-name" id="barberoNombre">Barbero</p>
          <p class="barber-identity-role">Estación activa</p>
        </div>
      </div>

      <nav class="barber-nav">
        <a href="barbero-dashboard.html" class="barber-nav-link">
          <span class="material-symbols-outlined">dashboard</span>
          <span>Dashboard</span>
        </a>
        <a href="barbero.html" class="barber-nav-link active">
          <span class="material-symbols-outlined">calendar_today</span>
          <span>Agenda</span>
        </a>
        <a href="barbero-config.html" class="barber-nav-link">
          <span class="material-symbols-outlined">settings</span>
          <span>Configuración</span>
        </a>
      </nav>

      <div class="barber-sidebar-footer">
        <button class="theme-toggle" title="Cambiar tema">
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button type="button" class="nav-link nav-button" data-logout>
          <span class="material-symbols-outlined">logout</span>
          Salir
        </button>
      </div>
    </aside>

    <main class="barber-main">
      <div class="barber-topbar">
        <h2>Agenda del día</h2>
        <p>Tus citas asignadas e insumos de estación.</p>
      </div>

      <div class="barber-grid">
        <div class="barber-panel">
          <div class="barber-panel-header">
            <span class="material-symbols-outlined">calendar_today</span>
            <h3>Mis citas</h3>
          </div>
          <div id="agenda" class="flex flex-col gap-3"></div>
        </div>

        <div class="barber-panel">
          <div class="barber-panel-header">
            <span class="material-symbols-outlined">inventory_2</span>
            <h3>Insumos de estación</h3>
          </div>
          <form id="formInsumo" class="flex flex-col gap-4">
            <div class="form-group">
              <label class="form-label" for="insumoId">ID Insumo</label>
              <input type="text" id="insumoId" class="form-input" placeholder="gel" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="nombreInsumo">Nombre</label>
              <input type="text" id="nombreInsumo" class="form-input" placeholder="Gel fijador" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="cantidadInsumo">Cantidad</label>
              <input type="number" id="cantidadInsumo" class="form-input" min="1" placeholder="1" required>
            </div>
            <button class="btn btn-primary" type="submit">
              <span class="material-symbols-outlined">add_circle</span>
              Registrar consumo
            </button>
          </form>
          <div id="insumos" class="flex flex-col gap-2 mt-4"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/barbero.js"></script>
</body>
</html>
