<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Barbero | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<header class="topbar">
  <div class="brand"><span class="brand-mark">BC</span><span>BarberCloud</span></div>
  <nav><button type="button" class="nav-button" onclick="AUTH.logout()">Salir</button></nav>
</header>
<main class="dashboard">
  <section class="dashboard-card">
    <p class="eyebrow">Barbero</p>
    <h2>Agenda del día</h2>
    <div id="agenda" class="table-list"></div>
  </section>
  <section class="dashboard-card">
    <h2>Insumos de estación</h2>
    <form id="formInsumo">
      <label for="insumoId">Insumo</label>
      <input id="insumoId" required value="gel">
      <label for="nombreInsumo">Nombre</label>
      <input id="nombreInsumo" required value="Gel fijador">
      <label for="cantidadInsumo">Cantidad</label>
      <input id="cantidadInsumo" type="number" min="1" required value="1">
      <button class="btn-primary" type="submit">Registrar consumo</button>
    </form>
    <div id="insumos" class="table-list"></div>
  </section>
</main>
<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/barbero.js"></script>
</body>
</html>
