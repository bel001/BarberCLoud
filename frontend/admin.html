<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador | BarberCloud</title>
  <link rel="stylesheet" href="assets/css/app.css">

<script>
  (function(){var t=localStorage.getItem("barbercloud_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();
</script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="brand-mark">BC</span>
        <span>BarberCloud</span>
      </a>
      <nav class="header-nav">
        <button class="theme-toggle" title="Cambiar tema">
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button type="button" class="nav-link nav-button" data-logout>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </nav>
    </div>
  </header>

  <main class="dashboard">
    <div class="container">
      <p class="eyebrow">Panel de Administración</p>
      <h1 style="margin-bottom: 32px;">Control total</h1>

      <div class="dashboard-grid">
        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20V10"/>
                <path d="M18 20V4"/>
                <path d="M6 20v-4"/>
              </svg>
              Reporte general
            </h3>
          </div>
          <div id="reporte" class="stats-grid"></div>
        </div>

        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Servicios y reglas
            </h3>
          </div>
          <form id="formServicio" class="flex flex-col gap-4 mb-4">
            <div class="form-group">
              <label class="form-label" for="nombreServicio">Nombre del servicio</label>
              <input type="text" id="nombreServicio" class="form-input" placeholder="Fade premium" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="precioServicio">Precio (S/)</label>
              <input type="number" id="precioServicio" class="form-input" min="1" placeholder="50" required>
            </div>
            <button class="btn btn-primary" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Guardar servicio
            </button>
          </form>
          <div id="servicios" class="flex flex-col gap-2"></div>
        </div>

        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="8.5" cy="7" r="4"/>
                <line x1="20" y1="8" x2="20" y2="14"/>
                <line x1="23" y1="11" x2="17" y2="11"/>
              </svg>
              Crear usuario interno
            </h3>
          </div>
          <form id="formPersonal" class="flex flex-col gap-4">
            <div class="form-group">
              <label class="form-label" for="nombrePersonal">Nombre</label>
              <input type="text" id="nombrePersonal" class="form-input" placeholder="Nuevo Barbero" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="emailPersonal">Correo</label>
              <input type="email" id="emailPersonal" class="form-input" placeholder="nuevo@barbercloud.com" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="rolPersonal">Rol</label>
              <select id="rolPersonal" class="form-input">
                <option value="BARBERO">BARBERO</option>
                <option value="SECRETARIA">SECRETARIA</option>
                <option value="ADMIN">ADMIN</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="passwordPersonal">Contraseña temporal</label>
              <input type="password" id="passwordPersonal" class="form-input" required>
            </div>
            <button class="btn btn-primary" type="submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="8.5" cy="7" r="4"/>
                <line x1="20" y1="8" x2="20" y2="14"/>
                <line x1="23" y1="11" x2="17" y2="11"/>
              </svg>
              Crear usuario
            </button>
          </form>
          <div id="personal" class="mt-4"></div>
        </div>

        <div class="dashboard-card">
          <div class="dashboard-card-header">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
              </svg>
              Operación global
            </h3>
          </div>
          <div id="global" class="stats-grid"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
